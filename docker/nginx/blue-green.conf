# Blue-Green upstream — comment/uncomment to switch traffic
upstream queryx_api {
  # BLUE (active)
  server api-blue:3000 max_fails=3 fail_timeout=30s;

  # GREEN (standby — uncomment to enable, comment out blue)
  # server api-green:3000 max_fails=3 fail_timeout=30s;
}

server {
  listen 80;
  server_name _;

  # Proxy headers
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Timeouts
  proxy_connect_timeout 10s;
  proxy_read_timeout 60s;

  location / {
    proxy_pass http://queryx_api;
  }

  location /health {
    proxy_pass http://queryx_api;
    access_log off;
  }
}
